name: WAHA for Home Assistant
version: "0.2.1"
slug: waha
description: Self-hosted WhatsApp API with a Home Assistant sidebar control panel
url: https://github.com/sebastian-greco/home-assistant-whatsapp
image: ghcr.io/sebastian-greco/ha-waha
arch:
  - amd64
startup: services
init: false
stage: experimental
ingress: true
ingress_entry: /
panel_icon: mdi:whatsapp
panel_title: WAHA
backup: cold
discovery:
  - waha_whatsapp
ports:
  3000/tcp: null
ports_description:
  3000/tcp: WAHA API and advanced dashboard (optional; keep disabled unless needed)
options:
  api_key: null
  session_name: default
  device_name: Home Assistant
  auto_create_session: true
  log_level: info
  download_media: false
schema:
  api_key: password
  session_name: "match(^[A-Za-z0-9_-]{1,64}$)"
  device_name: str
  auto_create_session: bool
  log_level: "list(error|warn|info|debug)"
  download_media: bool
