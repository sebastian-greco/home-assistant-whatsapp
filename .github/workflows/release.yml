name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "waha-v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Verify release version
        run: python scripts/check_version.py "${GITHUB_REF_NAME}"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == waha-v* ]]; then
            title="WAHA HAOS app ${GITHUB_REF_NAME#waha-v}"
          else
            title="WAHA WhatsApp integration ${GITHUB_REF_NAME#v}"
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --generate-notes \
            --title "${title}"
