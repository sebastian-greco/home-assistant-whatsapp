name: Build WAHA app

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "waha/**"
      - ".github/workflows/build-waha.yml"
  push:
    branches:
      - main
    paths:
      - "waha/**"
      - ".github/workflows/build-waha.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Read app version
        id: version
        shell: bash
        run: |
          version="$(awk -F '"' '/^version:/ { print $2; exit }' waha/config.yaml)"
          test -n "${version}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build WAHA app image
        uses: docker/build-push-action@v6
        with:
          context: ./waha
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/sebastian-greco/ha-waha:${{ steps.version.outputs.version }}
            ghcr.io/sebastian-greco/ha-waha:latest
          build-args: |
            BUILD_ARCH=amd64
            BUILD_VERSION=${{ steps.version.outputs.version }}
          labels: |
            io.hass.type=app
            io.hass.name=WAHA for Home Assistant
            io.hass.description=Self-hosted WhatsApp API with a Home Assistant sidebar control panel
            io.hass.url=https://github.com/sebastian-greco/home-assistant-whatsapp
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
