name: Validate

on:
  pull_request:
  push:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: python -m pip install aiohttp pytest pytest-asyncio pyyaml ruff
      - run: ruff check .
      - run: python scripts/check_version.py
      - run: python -m compileall -q custom_components tests
      - run: pytest
      - run: node --check waha/run.mjs
      - run: node --check waha/control.mjs
      - run: node --check waha/discovery.mjs
      - run: node --test waha/tests/*.test.mjs

  app-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: frenck/action-addon-linter@v2.21
        with:
          path: ./waha

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hacs/action@main
        with:
          category: integration
